# Stash Override: LinkedIn → Asia-Pacific
#
# 用途：为 LinkedIn 创建一个独立代理组，默认走亚太节点（JP/TW/HK/SG/KR），
#       DIRECT 作为兜底放在最后。
#
# 用法：在 Stash iOS App 中：
#   配置 → 选中订阅 → 覆写 → 添加覆写 → 粘贴 raw URL：
#   https://raw.githubusercontent.com/keithprc-creator/FIClash_ProxyGroup/main/stash/linkedin-asia.yaml
#
# 订阅每次更新都会自动重新拉取此覆写并合并，不会被冲掉。

proxy-groups:
  - name: LinkedIn
    type: select
    include-all: true
    filter: "(?i)(JP|Japan|日本|TW|Taiwan|台湾|HK|Hong[ -]?Kong|香港|SG|Singapore|新加坡|KR|Korea|韩国|亚太|Asia)"
    proxies:
      - DIRECT  # 兜底，列在自动填充的亚太节点之后

rules:
  - DOMAIN-SUFFIX,linkedin.com,LinkedIn
  - DOMAIN-SUFFIX,licdn.com,LinkedIn
  - DOMAIN-SUFFIX,lnkd.in,LinkedIn
  - DOMAIN-KEYWORD,linkedin,LinkedIn
